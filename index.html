<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title> Calculadora </title>
</head>
<body class="calculadora">

    <section class="Cabeza"> 
        <h1> Calculadora </h1>
        <div class="pantalla">
            <p> 0 </p>
        </div>
    </section>
    <section class="Cuerpo"> 
        <article class="columna-1"> 
            <p> 7 </p>
            <p> 8 </p>
            <p> 9 </p>
            <p id="DELETE"> DEL </p>
        </article>
        <article class="columna-2"> 
            <p> 4 </p>
            <p> 5 </p>
            <p> 6 </p>
            <p> + </p>
        </article>
        <article class="columna-3"> 
            <p> 1 </p>
            <p> 2 </p>
            <p> 3 </p>
            <p> - </p>
        </article>
        <article class="columna-4"> 
            <p> . </p>
            <p> 0 </p>
            <p> / </p>
            <p> x </p>
        </article>
        <article class="columna-5"> 
            <p id="RESET"> RESET </p>
            <p id="RESULTADO"> = </p>
        </article>
    </section>
</body>
</html>
